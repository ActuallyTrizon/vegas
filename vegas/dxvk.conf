# ============================================================================
# DXVK VEGAS StarEngine Configuration
# Version: 2.7.3-vegas
# ============================================================================
# Place this file next to the game executable, or set via:
#   export DXVK_CONFIG_FILE=/path/to/vegas/dxvk.conf
# ============================================================================

# --- StarEngine Features ---

# FSR 1.0 compute upscaler (Auto = on if Adreno, off otherwise)
# Values: Auto, True, False
dxvk.starEnableFsr = Auto

# LSFG frame doubling (Auto = on if Adreno, off otherwise)
# Values: Auto, True, False
dxvk.starEnableLsfg = Auto

# LSFG minimum frame time in ms before doubling triggers.
# 0 = per-tier default (disabled for tier 1, >29ms for tier 2, >33ms for tier 3)
dxvk.starLsfgThresholdMs = 0

# VRAM multiplier. 0 = per-tier default (% of system RAM).
# 1.0 = report real hardware size. 2.0 = double.
# 0.0 = auto (tier 1: 25%, tier 2: 33%, tier 3: 40% of system RAM)
dxvk.starVramMultiplier = 0

# Zero-initialize compute shared workgroup memory (Auto = on for Adreno, off otherwise)
# Helps Unity/Adreno stability. Set to False to disable (may improve perf, risk of artifacts).
# Values: Auto, True, False
dxvk.starZeroInit = Auto

# --- Standard DXVK Options ---

# HUD elements (comma-separated). Add 'starengine' for adaptive performance HUD.
# Example: dxvk.hud = fps,frametimes,starengine
dxvk.hud =

# Enable debug logging
dxvk.enableDebugUtils = False

# Tear-free presentation (Auto = respect game setting)
dxvk.tearFree = Auto

# Zero-initialize mapped buffer memory (recommended on Adreno)
dxvk.zeroMappedMemory = False
